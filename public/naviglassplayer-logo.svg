<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">NaviGlassPlayer logo</title>
  <desc id="desc">A frosted glass play button over blurred neon soundwaves.</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#181824"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec5e2a"/>
      <stop offset="50%" stop-color="#a832fc"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="edgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.52"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.12"/>
    </linearGradient>
    <filter id="glowBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <clipPath id="playHighlightClip" clipPathUnits="userSpaceOnUse">
      <path d="M195 152C195 140 208 132 218 138L373 230C383 236 383 252 373 258L218 350C208 356 195 348 195 336Z"/>
      <path d="M170 128H396V254H170Z"/>
    </clipPath>
  </defs>
  <rect x="32" y="32" width="448" height="448" rx="105" fill="url(#bgGrad)"/>
  <g filter="url(#glowBlur)" opacity="0.85">
    <path d="M120 280Q200 140 300 260T420 200" fill="none" stroke="url(#waveGrad)" stroke-width="45" stroke-linecap="round"/>
    <path d="M100 220Q220 320 320 180T400 300" fill="none" stroke="url(#waveGrad)" stroke-width="30" stroke-linecap="round"/>
  </g>
  <path d="M195 152C195 140 208 132 218 138L373 230C383 236 383 252 373 258L218 350C208 356 195 348 195 336Z" fill="url(#glassGrad)" stroke="url(#edgeGrad)" stroke-width="3"/>
  <path d="M195 152C195 140 208 132 218 138L373 230C383 236 383 252 373 258L218 350C208 356 195 348 195 336Z" fill="url(#edgeGrad)" clip-path="url(#playHighlightClip)" opacity="0.18"/>
</svg>
